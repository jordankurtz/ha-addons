server.document-root = "/usr/local/share/tar1090/html/"
server.port = 8080
server.bind = "0.0.0.0"
server.modules = (
    "mod_access",
    "mod_alias",
    "mod_setenv",
    "mod_redirect"
)

index-file.names = ( "index.html" )

mimetype.assign = (
    ".html" => "text/html",
    ".htm"  => "text/html",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".json" => "application/json",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ".gif"  => "image/gif",
    ".svg"  => "image/svg+xml",
    ".ico"  => "image/x-icon",
    ".woff" => "font/woff",
    ".woff2" => "font/woff2",
    ".ttf"  => "font/ttf"
)

# Serve readsb aircraft JSON and globe history
alias.url = (
    "/data/"           => "/run/readsb/",
    "/globe_history/"  => "/data/ultrafeeder/globe_history/",
    "/heatmap/"        => "/data/ultrafeeder/heatmap/"
)

# CORS headers
setenv.add-response-header = (
    "Access-Control-Allow-Origin" => "*",
    "Access-Control-Allow-Methods" => "GET, OPTIONS",
    "Access-Control-Allow-Headers" => "Content-Type"
)

server.errorlog = "/dev/stderr"
