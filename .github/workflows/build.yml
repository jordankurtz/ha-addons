name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, auto-update-dependencies]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      check_updates:
        description: 'Check for dependency updates'
        type: boolean
        default: true

jobs:
  changes:
    name: Detect changes
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.check_updates)
    runs-on: ubuntu-latest
    outputs:
      pihole: ${{ steps.filter.outputs.pihole || steps.force.outputs.all }}
      piaware: ${{ steps.filter.outputs.piaware || steps.force.outputs.all }}
      unbound: ${{ steps.filter.outputs.unbound || steps.force.outputs.all }}
      gpsd: ${{ steps.filter.outputs.gpsd || steps.force.outputs.all }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            pihole:
              - 'pihole/**'
            piaware:
              - 'piaware/**'
            unbound:
              - 'unbound/**'
            gpsd:
              - 'gpsd/**'
      - name: Force all builds on dispatch
        if: github.event_name == 'workflow_dispatch'
        id: force
        run: echo "all=true" >> "$GITHUB_OUTPUT"

  build-pihole:
    name: Build Pi-hole
    needs: changes
    if: needs.changes.outputs.pihole == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: pihole
          push: false
          platforms: linux/amd64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm
            PIHOLE_VERSION=2026.02.0

  build-piaware:
    name: Build PiAware
    needs: changes
    if: needs.changes.outputs.piaware == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: piaware
          push: false
          platforms: linux/amd64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm
            DUMP1090_VERSION=v9.0
            PIAWARE_BUILDER_VERSION=v9.0.1

  build-gpsd:
    name: Build gpsd
    needs: changes
    if: needs.changes.outputs.gpsd == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: gpsd
          push: false
          platforms: linux/amd64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm
            GPSD_VERSION=release-3.27.5

  build-unbound:
    name: Build Unbound
    needs: changes
    if: needs.changes.outputs.unbound == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: unbound
          push: false
          platforms: linux/amd64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm

  check-updates:
    name: Check dependency updates
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.check_updates)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for dependency updates
        id: updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read current versions from build.yaml (source of truth)
          current_pihole=$(grep 'PIHOLE_VERSION:' pihole/build.yaml | sed 's/.*"\(.*\)".*/\1/')
          current_dump1090=$(grep 'DUMP1090_VERSION:' piaware/build.yaml | sed 's/.*"\(.*\)".*/\1/')
          current_piaware=$(grep 'PIAWARE_BUILDER_VERSION:' piaware/build.yaml | sed 's/.*"\(.*\)".*/\1/')
          current_gpsd=$(grep 'GPSD_VERSION:' gpsd/build.yaml | sed 's/.*"\(.*\)".*/\1/')

          echo "Current versions:"
          echo "  Pi-hole: $current_pihole"
          echo "  dump1090: $current_dump1090"
          echo "  PiAware: $current_piaware"
          echo "  gpsd: $current_gpsd"

          # Fetch latest versions
          # Pi-hole publishes GitHub releases; FlightAware repos use tags only
          # gpsd is hosted on GitLab — fetch tags matching release-* via the GitLab API
          latest_pihole=$(gh api repos/pi-hole/docker-pi-hole/releases/latest --jq '.tag_name')
          latest_dump1090=$(gh api repos/flightaware/dump1090/tags --jq '.[0].name')
          latest_piaware=$(gh api repos/flightaware/piaware_builder/tags --jq '.[0].name')
          latest_gpsd=$(curl -sf "https://gitlab.com/api/v4/projects/gpsd%2Fgpsd/repository/tags?order_by=version&sort=desc&search=release-&per_page=1" \
            | jq -r '.[0].name')

          echo "Latest versions:"
          echo "  Pi-hole: $latest_pihole"
          echo "  dump1090: $latest_dump1090"
          echo "  PiAware: $latest_piaware"
          echo "  gpsd: $latest_gpsd"

          if [ -z "$latest_pihole" ] || [ -z "$latest_dump1090" ] || [ -z "$latest_piaware" ] || [ -z "$latest_gpsd" ] || [ "$latest_gpsd" = "null" ]; then
            echo "::error::Failed to fetch one or more latest versions"
            exit 1
          fi

          # Compare and build update summary
          updates=""
          title_parts=""
          has_updates=false

          if [ "$current_pihole" != "$latest_pihole" ]; then
            has_updates=true
            updates="${updates}- **Pi-hole**: \`${current_pihole}\` → \`${latest_pihole}\`\n"
            title_parts="${title_parts}Pi-hole to ${latest_pihole}, "
            sed -i "s/PIHOLE_VERSION: \"${current_pihole}\"/PIHOLE_VERSION: \"${latest_pihole}\"/" pihole/build.yaml
            sed -i "s/ARG PIHOLE_VERSION=${current_pihole}/ARG PIHOLE_VERSION=${latest_pihole}/" pihole/Dockerfile
          fi

          if [ "$current_dump1090" != "$latest_dump1090" ]; then
            has_updates=true
            updates="${updates}- **dump1090**: \`${current_dump1090}\` → \`${latest_dump1090}\`\n"
            title_parts="${title_parts}dump1090 to ${latest_dump1090}, "
            sed -i "s/DUMP1090_VERSION: \"${current_dump1090}\"/DUMP1090_VERSION: \"${latest_dump1090}\"/" piaware/build.yaml
            sed -i "s/ARG DUMP1090_VERSION=${current_dump1090}/ARG DUMP1090_VERSION=${latest_dump1090}/" piaware/Dockerfile
          fi

          if [ "$current_piaware" != "$latest_piaware" ]; then
            has_updates=true
            updates="${updates}- **PiAware**: \`${current_piaware}\` → \`${latest_piaware}\`\n"
            title_parts="${title_parts}PiAware to ${latest_piaware}, "
            sed -i "s/PIAWARE_BUILDER_VERSION: \"${current_piaware}\"/PIAWARE_BUILDER_VERSION: \"${latest_piaware}\"/" piaware/build.yaml
            sed -i "s/ARG PIAWARE_BUILDER_VERSION=${current_piaware}/ARG PIAWARE_BUILDER_VERSION=${latest_piaware}/" piaware/Dockerfile
          fi

          if [ "$current_gpsd" != "$latest_gpsd" ]; then
            has_updates=true
            updates="${updates}- **gpsd**: \`${current_gpsd}\` → \`${latest_gpsd}\`\n"
            title_parts="${title_parts}gpsd to ${latest_gpsd}, "
            sed -i "s/GPSD_VERSION: \"${current_gpsd}\"/GPSD_VERSION: \"${latest_gpsd}\"/" gpsd/build.yaml
            sed -i "s/GPSD_VERSION=${current_gpsd}/GPSD_VERSION=${latest_gpsd}/" .github/workflows/build.yml
          fi

          echo "has_updates=$has_updates" >> "$GITHUB_OUTPUT"

          if [ "$has_updates" = true ]; then
            title_parts="${title_parts%, }"
            pr_title="Update ${title_parts}"
            echo "pr_title=${pr_title}" >> "$GITHUB_OUTPUT"
            echo "commit_message=${pr_title}" >> "$GITHUB_OUTPUT"

            {
              echo "pr_body<<EOF"
              echo "## Dependency Updates"
              echo ""
              echo -e "$updates"
              echo "---"
              echo "*This PR was created automatically by the dependency update checker.*"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: peter-evans/create-pull-request@v7
        id: create-pr
        if: steps.updates.outputs.has_updates == 'true'
        with:
          branch: auto-update-dependencies
          title: ${{ steps.updates.outputs.pr_title }}
          body: ${{ steps.updates.outputs.pr_body }}
          commit-message: ${{ steps.updates.outputs.commit_message }}

